version: '3.8'

services:
  backend-v2:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: flashcred-v2-api
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    shm_size: '2gb'
    environment:
      - DISPLAY=:0
      - QT_X11_NO_MITSHM=1
      - _X11_NO_MITSHM=1
    volumes:
      - ./server/cookies:/app/cookies
      - ./server/storage:/app/storage
      - /tmp/.X11-unix:/tmp/.X11-unix

  frontend-v2:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: flashcred-v2-web
    restart: always
    ports:
      - "3010:80"
    depends_on:
      - backend-v2

networks:
  default:
    name: flashcred-v2-network
